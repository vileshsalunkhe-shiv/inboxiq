version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: inboxiq-postgres
    environment:
      POSTGRES_DB: inboxiq_dev
      POSTGRES_USER: inboxiq
      POSTGRES_PASSWORD: inboxiq_dev_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inboxiq -d inboxiq_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inboxiq-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: inboxiq-redis
    command: redis-server --appendonly yes --requirepass inboxiq_redis_pass
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inboxiq-network

  # Backend API (FastAPI)
  backend:
    build:
      context: ../
      dockerfile: infrastructure/railway/backend.Dockerfile
    container_name: inboxiq-backend
    environment:
      # Server
      PORT: 8000
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
      
      # Database
      DATABASE_URL: postgresql://inboxiq:inboxiq_dev_password@postgres:5432/inboxiq_dev
      DATABASE_POOL_SIZE: 10
      DATABASE_MAX_OVERFLOW: 20
      
      # Redis
      REDIS_URL: redis://:inboxiq_redis_pass@redis:6379/0
      
      # Authentication
      JWT_SECRET_KEY: dev-secret-key-change-in-production
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 30
      
      # Google OAuth (Replace with your credentials)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-your-client-id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-your-client-secret}
      GOOGLE_REDIRECT_URI: http://localhost:8000/auth/callback
      
      # Claude AI (Replace with your key)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-your-anthropic-key}
      CLAUDE_MODEL: claude-3-haiku-20240307
      CLAUDE_MAX_TOKENS: 1024
      
      # Security
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-encryption-key-32-chars-minimum}
      CORS_ORIGINS: http://localhost:3000,http://localhost:8000
      
      # Monitoring
      SENTRY_DSN: ${SENTRY_DSN:-}
      
      # APNs (iOS Push Notifications)
      APNS_KEY_ID: ${APNS_KEY_ID:-}
      APNS_TEAM_ID: ${APNS_TEAM_ID:-}
      APNS_BUNDLE_ID: ${APNS_BUNDLE_ID:-com.inboxiq.app}
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
      - backend_cache:/app/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - inboxiq-network
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        echo 'Running migrations...' &&
        alembic upgrade head &&
        echo 'Starting backend server...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # AI Worker
  worker:
    build:
      context: ../
      dockerfile: infrastructure/railway/worker.Dockerfile
    container_name: inboxiq-worker
    environment:
      # Server
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
      
      # Database
      DATABASE_URL: postgresql://inboxiq:inboxiq_dev_password@postgres:5432/inboxiq_dev
      
      # Redis
      REDIS_URL: redis://:inboxiq_redis_pass@redis:6379/0
      
      # Claude AI
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-your-anthropic-key}
      CLAUDE_MODEL: claude-3-haiku-20240307
      CLAUDE_MAX_TOKENS: 1024
      
      # Worker Configuration
      WORKER_CONCURRENCY: 3
      WORKER_BATCH_SIZE: 10
      WORKER_POLL_INTERVAL: 5
      
      # Monitoring
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - ../backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - inboxiq-network
    command: python -m app.worker.main

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: inboxiq-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@inboxiq.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - inboxiq-network
    profiles:
      - tools

  # Optional: Redis Commander for Redis management
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: inboxiq-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379:0:inboxiq_redis_pass
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - inboxiq-network
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_cache:
    driver: local
  pgadmin_data:
    driver: local

networks:
  inboxiq-network:
    driver: bridge
